# Hello World Pack — TAR Engine reference demo pack
# Demonstrates the standard Claude Code SKILL.md format that all packs use.

name: hello-world
display_name: Hello World Pack
version: 0.1.0
description: |
  A 5-minute demo. Submit a wish like "echo hi" or "summarize https://example.com"
  and watch TAR Engine route it through the planner, run a skill, audit it,
  and return a result.

  This pack ships with two skills that demonstrate the two common skill shapes:

  - `echo` — pure SKILL.md, no scripts. The LLM responds directly from the
    SKILL.md instructions.
  - `url-summarize` — SKILL.md + scripts/fetch.py. The SKILL.md tells the LLM
    to invoke the fetch script via run_bash, then summarize the output.

# Skills — each has its own SKILL.md (Claude Code standard format).
# The engine reads SKILL.md only; scripts are invoked by the LLM via run_bash.
skills:
  - name: echo
    path: skills/echo
    description: Echo back the user's input verbatim. Use for greetings or smoke tests.

  - name: url-summarize
    path: skills/url-summarize
    description: Fetch a URL and produce a one-paragraph summary.

planner_template: planner.md
profile_schema: profile_schema.yaml
