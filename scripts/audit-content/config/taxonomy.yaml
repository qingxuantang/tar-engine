# Per-platform raw category → our subcategory mapping.
# Keys are the raw categories as the platform spells them; values are our
# subcategory id. Anything unmapped falls back to platform-specific defaults
# (configurable per source in skill_source.py).
platform_category_mapping:
  lenny-skills:
    "Product Management": product-management
    "Hiring & Teams": hiring-teams
    "Leadership": coaching
    "AI & Technology": ai-ml
    "Communication": pr-comms
    "Growth": growth
    "Marketing": marketing-copy
    "Career": career-advice
    "Sales & GTM": outbound
    "Engineering": backend
    "Design": ui-ux

  skillhub-club:
    "Development": backend
    "DevOps": devops-cloud
    "Testing": testing-qa
    "Documentation": technical-writing
    "Security": security
    "Data": data-engineering
    "AI/ML": ai-ml
    "Frontend": frontend
    "Backend": backend
    "Mobile": mobile
    "Cloud": devops-cloud
    "Productivity": productivity
    "Writing": technical-writing
    "Design": ui-ux
    "Meta": meta-skills
    "Integration": integration
    "Communication": pr-comms
    "Research": user-research

  clawhub-ai:
    "MCP Tools": mcp-tools
    "Prompts": prompts-rag
    "Workflows": integration
    "Dev Tools": backend
    "Data & APIs": data-engineering
    "Security": security
    "Automation": personal-automation
    "Other": productivity

  skillsmp-com:
    # BLS occupation groups → our subcategories. Mapping the productive top 10
    # only; the long tail of farming / fishing etc. won't realistically be
    # ingested unless we explicitly opt in.
    "Computer and Mathematical Occupations": backend
    "Business and Financial Operations Occupations": finance-legal
    "Arts, Design, Entertainment, Sports, and Media Occupations": visual-brand
    "Office and Administrative Support Occupations": admin-coordination
    "Educational Instruction and Library Occupations": skill-building
    "Life, Physical, and Social Science Occupations": academic-scientific
    "Legal Occupations": finance-legal
    "Management Occupations": coaching
    "Sales and Related Occupations": outbound
    "Architecture and Engineering Occupations": backend

  anthropic-skills:
    # Anthropic's official repo doesn't categorize — we infer from skill name.
    # This is a default that gets overridden per-skill via name regex below.
    "_default": meta-skills

# Per-skill name/description regex hints for sources that don't categorize.
# Applied in order, first match wins. Patterns also see the skill's
# description (frontmatter) appended, so we can catch intent that's not in
# the slug alone.
name_inference_rules:
  # ── meta + creator skills first (broadest catch) ──
  - pattern: "(?i)\\bskill[-_]?creator|\\bmeta[-_]?skill|writing.*skill\\b"
    subcategory: meta-skills

  # ── design (must come before "engineering" patterns) ──
  - pattern: "(?i)\\bdesign[-_]?system"
    subcategory: design-systems
  - pattern: "(?i)\\bdesign[-_]?engineer|\\bprototyp|\\bfigma|wireframe"
    subcategory: prototyping
  - pattern: "(?i)\\b(canvas|theme|frontend-design)\\b"
    subcategory: ui-ux
  - pattern: "(?i)\\bbrand[-_]?(storytell|guideline|identity)|\\blogo\\b|\\bpositioning\\b"
    subcategory: visual-brand

  # ── sales / GTM ──
  - pattern: "(?i)\\b(founder|enterprise|outbound|cold[-_]?(call|email))[-_]?sales?\\b"
    subcategory: outbound
  - pattern: "(?i)\\bsales[-_]?(team|process|compensation|leadership)|\\bbuilding[-_]sales\\b"
    subcategory: closing
  - pattern: "(?i)\\b(pricing|packaging|monetization|fundraising|venture)\\b"
    subcategory: pricing
  - pattern: "(?i)\\bcustomer[-_]?(success|retention|support)\\b|\\bchurn\\b"
    subcategory: customer-success

  # ── marketing + content ──
  - pattern: "(?i)\\b(content|launch|product)[-_]?marketing\\b|\\bgo[-_]?to[-_]?market\\b"
    subcategory: marketing-copy
  - pattern: "(?i)\\bnewsletter|email[-_]?(outreach|marketing|sequence)"
    subcategory: email-outreach
  - pattern: "(?i)\\bpresentation|\\bpitch[-_]?(deck|practice)|\\bspeaking\\b|\\bgiving[-_]presentations\\b"
    subcategory: pr-comms

  # ── growth ──
  - pattern: "(?i)\\bgrowth[-_]?(loops?|hack|engine)|\\bviralit|\\bnetwork[-_]?effect"
    subcategory: growth
  - pattern: "(?i)\\bacquisition|\\bretention\\b|\\bactivation\\b"
    subcategory: growth

  # ── product ──
  - pattern: "(?i)\\b(product[-_]?vision|product[-_]?strategy|roadmap|trade[-_]?off|prioritization)\\b"
    subcategory: strategy-roadmap
  - pattern: "(?i)\\b(behavioral[-_]?product[-_]?design|dogfooding|product[-_]?management|cross[-_]?functional)\\b"
    subcategory: product-management
  - pattern: "(?i)\\b(evaluating[-_]new[-_]technology|analytics|metric|experiment|ab[-_]?test)"
    subcategory: analytics

  # ── user / market research ──
  - pattern: "(?i)\\b(user[-_]?interview|user[-_]?feedback|customer[-_]?(interview|feedback|research)|survey|qualitative)"
    subcategory: user-research
  - pattern: "(?i)\\b(competitive[-_]?analysis|market[-_]?(research|sizing))"
    subcategory: market-research

  # ── leadership / coaching / culture / career ──
  - pattern: "(?i)\\b(team[-_]?culture|engineering[-_]?culture|building[-_]?team)"
    subcategory: hr-culture
  - pattern: "(?i)\\b(having[-_]?difficult|delegat|coaching|mentor|sponsor|imposter|energy[-_]?management|managing[-_]?up)"
    subcategory: coaching
  - pattern: "(?i)\\bbuilding[-_]?(a[-_]?promotion|first[-_]?manager)|first[-_]?time[-_]?manager"
    subcategory: career-advice
  - pattern: "(?i)\\b(career[-_]?(transition|advice|growth)|finding[-_]?(mentor|sponsor))"
    subcategory: career-advice

  # ── hiring ──
  - pattern: "(?i)\\b(hiring|evaluating[-_]?candidates|conducting[-_]?(interview|hiring))|onboarding\\b"
    subcategory: hiring-teams
  - pattern: "(?i)\\b(performance[-_]?review|raise|firing|laid[-_]?off)"
    subcategory: hr-culture

  # ── community ──
  - pattern: "(?i)\\bcommunity[-_]?building\\b|\\bdevrel\\b|\\bdeveloper[-_]?relations\\b"
    subcategory: marketing-copy

  # ── data + AI/ML ──
  - pattern: "(?i)\\b(ai[-_]?evals?|llm[-_]?eval|model[-_]?quality)\\b"
    subcategory: ai-ml
  - pattern: "(?i)\\b(ai[-_]?product[-_]?strategy|building[-_]?with[-_]?llm|ai[-_]?adoption)"
    subcategory: ai-ml
  - pattern: "(?i)\\b(mcp|agent[-_]?tool|tool[-_]?builder)\\b"
    subcategory: mcp-tools
  - pattern: "(?i)\\b(prompt[-_]?(engineer|template)|rag|retrieval|context[-_]?engineering)"
    subcategory: prompts-rag
  - pattern: "(?i)\\b(sql|etl|data[-_]?(engineering|pipeline|warehouse))\\b"
    subcategory: data-engineering
  - pattern: "(?i)\\b(machine[-_]?learning|model[-_]?train|fine[-_]?tun|gradient)\\b"
    subcategory: ai-ml

  # ── engineering subcategories (fall through bucket) ──
  - pattern: "(?i)\\b(backend|server|api|microservice|rest|graphql)\\b"
    subcategory: backend
  - pattern: "(?i)\\b(frontend|react|vue|svelte|next|component[-_]?library)\\b"
    subcategory: frontend
  - pattern: "(?i)\\b(mobile|ios|android|flutter|react[-_]?native)\\b"
    subcategory: mobile
  - pattern: "(?i)\\b(devops|kubernetes|docker|terraform|aws|gcp|azure|infrastructure)\\b"
    subcategory: devops-cloud
  - pattern: "(?i)\\b(security|auth|secret|vulnerab|csp|owasp)\\b"
    subcategory: security
  - pattern: "(?i)\\b(testing|tdd|pytest|jest|test[-_]?suite|qa)\\b"
    subcategory: testing-qa

  # ── productivity / integration / automation ──
  - pattern: "(?i)\\b(productivity|task[-_]?management|workflow)\\b"
    subcategory: productivity
  - pattern: "(?i)\\b(integration|zapier|webhook|automation|n8n)\\b"
    subcategory: integration
  - pattern: "(?i)\\b(slack[-_]?gif|emoji|chat[-_]?bot)\\b"
    subcategory: integration

  # ── format converters / office docs ──
  - pattern: "(?i)\\bpdf\\b|\\b(docx|pptx|xlsx)\\b|\\bdoc[-_]?coauthor"
    subcategory: technical-writing

  # ── art (creative) ──
  - pattern: "(?i)\\balgorithmic[-_]?art|generative[-_]?art|creative[-_]?coding"
    subcategory: ui-ux

  # ── claude / anthropic api ──
  - pattern: "(?i)\\bclaude[-_]?(api|sdk)|anthropic[-_]?(api|sdk)"
    subcategory: ai-ml

  # ── second wave to catch Lenny's PM/strategy/writing skills ──
  - pattern: "(?i)\\b(writing[-_]?(prd|spec|job[-_]?description)|writing[-_]?specs|written[-_]?communication)"
    subcategory: technical-writing
  - pattern: "(?i)\\binternal[-_]?comms?|status[-_]?report"
    subcategory: pr-comms
  - pattern: "(?i)\\b(running[-_]?(decision|1[-_]?1|effective[-_]?meet|design[-_]?review|offsite)|team[-_]?ritual|post[-_]?mortem|retrospective)"
    subcategory: coaching
  - pattern: "(?i)\\b(organizational[-_]?(design|transformation))"
    subcategory: hr-culture
  - pattern: "(?i)\\b(evaluating[-_]?trade|problem[-_]?definition|scoping[-_]?cutting|working[-_]?backwards|product[-_]?taste|shipping[-_]?products|startup[-_]?ideation|startup[-_]?pivot)"
    subcategory: product-management
  - pattern: "(?i)\\b(managing[-_]?(timeline|tech[-_]?debt)|setting[-_]?okr|planning[-_]?under[-_]?uncertainty|technical[-_]?roadmap)"
    subcategory: strategy-roadmap
  - pattern: "(?i)\\b(media[-_]?relations|partnership[-_]?bd|product[-_]?led[-_]?sales|marketplace[-_]?liquidity|sales[-_]?qualification)"
    subcategory: outbound
  - pattern: "(?i)\\b(systems[-_]?thinking)"
    subcategory: strategy-roadmap
  - pattern: "(?i)\\b(negotiating[-_]?offer)"
    subcategory: career-advice
  - pattern: "(?i)\\b(web[-_]?artifact|html[-_]?artifact)"
    subcategory: frontend
  - pattern: "(?i)\\b(template[-_]?skill)"
    subcategory: meta-skills
