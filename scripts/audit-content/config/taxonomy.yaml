    subcategories:
      - id: outbound
        title_en: "Outbound & Prospecting"
        title_zh: "外呼与拓客"
        aliases: ["outbound", "prospecting", "lead-gen"]
      - id: closing
        title_en: "Closing & Negotiation"
        title_zh: "成单与谈判"
        aliases: ["closing", "negotiation", "sales-process"]
      - id: pricing
        title_en: "Pricing & Packaging"
        title_zh: "定价与打包"
        aliases: ["pricing", "packaging", "monetization"]
      - id: customer-success
        title_en: "Customer Success"
        title_zh: "客户成功"
        aliases: ["customer-success", "cs", "retention", "support"]

  - id: operations-people
    title_en: "Operations & People"
    title_zh: "运营与人事"
    description_en: "Hiring, HR, finance, legal, admin"
    description_zh: "招聘、HR、财务、法务、行政"
    subcategories:
      - id: hiring-teams
        title_en: "Hiring & Teams"
        title_zh: "招聘与团队"
        aliases: ["hiring", "teams", "recruitment", "onboarding"]
      - id: hr-culture
        title_en: "HR & Culture"
        title_zh: "HR 与文化"
        aliases: ["hr", "culture", "performance", "people"]
      - id: finance-legal
        title_en: "Finance & Legal"
        title_zh: "财务与法务"
        aliases: ["finance", "legal", "accounting", "compliance"]
      - id: admin-coordination
        title_en: "Admin & Coordination"
        title_zh: "行政与协调"
        aliases: ["admin", "coordination", "operations", "ops"]

  - id: research-science
    title_en: "Research & Science"
    title_zh: "研究与科学"
    description_en: "User research, market research, academic / scientific"
    description_zh: "用户研究、市场研究、学术与科研"
    subcategories:
      - id: user-research
        title_en: "User Research"
        title_zh: "用户研究"
        aliases: ["user-research", "ux-research", "interviewing"]
      - id: market-research
        title_en: "Market Research"
        title_zh: "市场研究"
        aliases: ["market-research", "competitive-analysis"]
      - id: academic-scientific
        title_en: "Academic & Scientific"
        title_zh: "学术与科研"
        aliases: ["academic", "scientific", "research", "science"]

  - id: workflow-automation
    title_en: "Workflow & Automation"
    title_zh: "工作流与自动化"
    description_en: "Productivity, integration, meta-skills, personal automation"
    description_zh: "效率、集成、Meta-Skill、个人自动化"
    subcategories:
      - id: productivity
        title_en: "Productivity"
        title_zh: "效率"
        aliases: ["productivity", "workflow", "task-management"]
      - id: integration
        title_en: "Integration & Workflow"
        title_zh: "集成与工作流"
        aliases: ["integration", "workflow", "automation", "zapier"]
      - id: meta-skills
        title_en: "Meta-Skills"
        title_zh: "Meta Skill (写 skill 的 skill)"
        aliases: ["meta", "meta-skill", "skill-creator"]
      - id: personal-automation
        title_en: "Personal Automation"
