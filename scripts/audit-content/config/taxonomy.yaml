# Michelin Guide skill taxonomy (米其林指南专用).
#
# 10 top-level categories chosen to reflect READER personas — engineers see
# engineering audits, PMs see PM audits, designers see design audits.
# Each top-level has 2-5 subcategories. Source-platform categories are
# mapped via the `aliases` field on each subcategory.
#
# Approved by Mark 2026-06-03.

taxonomy:
  - id: engineering
    title_en: "Engineering & Code"
    title_zh: "工程与代码"
    description_en: "Backend, frontend, mobile, ops, security, testing"
    description_zh: "后端、前端、移动、运维、安全、测试"
    subcategories:
      - id: backend
        title_en: "Backend"
        title_zh: "后端"
        aliases: ["backend", "server", "api", "microservices"]
      - id: frontend
        title_en: "Frontend"
        title_zh: "前端"
        aliases: ["frontend", "ui", "react", "vue", "svelte"]
      - id: mobile
        title_en: "Mobile"
        title_zh: "移动端"
        aliases: ["mobile", "ios", "android", "flutter", "react-native"]
      - id: devops-cloud
        title_en: "DevOps & Cloud"
        title_zh: "DevOps 与云"
        aliases: ["devops", "cloud", "kubernetes", "docker", "aws", "gcp", "azure", "infrastructure"]
      - id: security
        title_en: "Security"
        title_zh: "安全"
        aliases: ["security", "auth", "authentication", "secrets", "vulnerability"]
      - id: testing-qa
        title_en: "Testing & QA"
        title_zh: "测试与 QA"
        aliases: ["testing", "qa", "test", "quality", "tdd"]

  - id: data-ai
    title_en: "Data & AI"
    title_zh: "数据与 AI"
    description_en: "Data engineering, ML, MCP tools, prompts and RAG"
    description_zh: "数据工程、机器学习、MCP 工具、Prompt 与 RAG"
    subcategories:
      - id: data-engineering
        title_en: "Data Engineering"
        title_zh: "数据工程"
        aliases: ["data", "etl", "pipeline", "database", "sql", "analytics-engineering"]
      - id: ai-ml
        title_en: "AI/ML"
        title_zh: "AI 与机器学习"
        aliases: ["ai", "ml", "ai/ml", "machine-learning", "model", "training"]
      - id: mcp-tools
        title_en: "MCP & Tools"
        title_zh: "MCP 与 Agent 工具"
        aliases: ["mcp", "mcp-tools", "tool", "agent-tool"]
      - id: prompts-rag
        title_en: "Prompts & RAG"
        title_zh: "Prompt 与 RAG"
        aliases: ["prompt", "prompts", "rag", "retrieval", "context"]

  - id: product-strategy
    title_en: "Product & Strategy"
    title_zh: "产品与战略"
    description_en: "Product management, growth, strategy, analytics"
    description_zh: "产品管理、增长、战略、分析"
    subcategories:
      - id: product-management
        title_en: "Product Management"
        title_zh: "产品管理"
        aliases: ["product-management", "pm", "product"]
      - id: growth
        title_en: "Growth"
        title_zh: "增长"
        aliases: ["growth", "growth-loops", "acquisition", "retention"]
      - id: strategy-roadmap
        title_en: "Strategy & Roadmap"
        title_zh: "战略与路线图"
        aliases: ["strategy", "roadmap", "vision", "planning"]
      - id: analytics
        title_en: "Analytics"
        title_zh: "分析"
        aliases: ["analytics", "metrics", "data-analytics", "experimentation"]

  - id: design
    title_en: "Design"
    title_zh: "设计"
    description_en: "UI/UX, visual + brand, design systems, prototyping"
    description_zh: "UI/UX、视觉与品牌、设计系统、原型"
    subcategories:
      - id: ui-ux
        title_en: "UI/UX"
        title_zh: "界面与体验"
        aliases: ["ui-ux", "ui", "ux", "interaction"]
      - id: visual-brand
        title_en: "Visual & Brand"
        title_zh: "视觉与品牌"
        aliases: ["visual", "brand", "branding", "logo", "identity"]
      - id: design-systems
        title_en: "Design Systems"
        title_zh: "设计系统"
        aliases: ["design-system", "tokens", "components"]
      - id: prototyping
        title_en: "Prototyping"
        title_zh: "原型"
        aliases: ["prototype", "prototyping", "figma", "wireframe"]

  - id: communication-writing
    title_en: "Communication & Writing"
    title_zh: "沟通与写作"
    description_en: "Technical writing, marketing copy, PR, email outreach"
    description_zh: "技术写作、营销文案、PR、邮件触达"
    subcategories:
      - id: technical-writing
        title_en: "Technical Writing"
        title_zh: "技术写作"
        aliases: ["technical-writing", "documentation", "docs", "tech-writing"]
      - id: marketing-copy
        title_en: "Marketing Copy"
        title_zh: "营销文案"
        aliases: ["marketing", "copywriting", "content"]
      - id: pr-comms
        title_en: "PR & Comms"
        title_zh: "PR 与公关"
        aliases: ["pr", "comms", "communications", "media"]
      - id: email-outreach
        title_en: "Email & Outreach"
        title_zh: "邮件与触达"
