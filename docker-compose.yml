# TAR Engine OSS — single-container compose
# Run: docker compose up -d
# Access: http://localhost:8765/healthz

services:
  tar-engine:
    build: .
    container_name: tar-engine-oss
    ports:
      - "127.0.0.1:${PORT:-8765}:8765"
    environment:
      - PORT=8765
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ENABLE_RAG=${ENABLE_RAG:-false}
      - CHROMA_DB_DIR=/data/chroma_db
      - TAR_ENGINE_COMMIT_SHA=${TAR_ENGINE_COMMIT_SHA:-}
    volumes:
      - tar-engine-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  tar-engine-data:
