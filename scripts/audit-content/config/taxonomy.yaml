        aliases: ["personal-automation", "scripting"]

  - id: career-learning
    title_en: "Career & Learning"
    title_zh: "职业与学习"
    description_en: "Career advice, skill-building, coaching, learning resources"
    description_zh: "职业建议、技能成长、教练、学习资源"
    subcategories:
      - id: career-advice
        title_en: "Career Advice"
        title_zh: "职业建议"
        aliases: ["career", "career-advice"]
      - id: skill-building
        title_en: "Skill Building"
        title_zh: "技能成长"
        aliases: ["skill-building", "learning"]
      - id: coaching
        title_en: "Coaching & Mentorship"
        title_zh: "教练与导师"
        aliases: ["coaching", "mentorship", "leadership"]
      - id: learning-resources
        title_en: "Learning Resources"
        title_zh: "学习资源"
